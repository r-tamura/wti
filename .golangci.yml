version: "2"

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - revive
  settings:
    errcheck:
      # Writes to stdout/stderr and closing read-only files are intentionally
      # unchecked throughout the CLI.
      exclude-functions:
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
        - (*os.File).Close

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
